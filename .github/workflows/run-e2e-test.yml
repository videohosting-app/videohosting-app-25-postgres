name: run-e2e-test

on:
  workflow_call:
    inputs:
      application_url:
        description: Deployed application base URL for UI tests
        required: true
        type: string
  workflow_dispatch:
    inputs:
      application_url:
        description: Deployed application base URL for UI tests
        required: true
        type: string

jobs:
  e2e-ui-tests:
    name: Run E2E UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      selenium:
        image: selenium/standalone-chromium:latest
        ports:
          - 4444:4444
        # Чекаємо, поки Selenium стане доступним, перш ніж запускати кроки
        options: >-
          --health-cmd "curl -f http://localhost:4444/wd/hub/status"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Prepare artifact directories
        run: mkdir -p target/ci-logs target/e2e-artifacts/videos target/e2e-artifacts/screenshots

      - name: Run E2E UI tests
        shell: bash
        env:
          E2E_BASE_URL: ${{ inputs.application_url }}
          E2E_ARTIFACTS_DIR: target/e2e-artifacts
          # Опція для прискорення Maven у CI
          MAVEN_OPTS: "-Xmx2048m -Dhttp.keepAlive=false -Dmaven.wagon.http.pool=false"
        run: |
          chmod +x .github/workflows/scripts/run-e2e-test.sh
          ./.github/workflows/scripts/run-e2e-test.sh

      - name: Upload E2E reports and media
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ui-test-artifacts
          path: |
            target/failsafe-reports/**
            target/ci-logs/**
            target/e2e-artifacts/**
          if-no-files-found: warn
