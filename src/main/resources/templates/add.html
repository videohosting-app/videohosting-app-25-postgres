<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Додати запис</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="container mt-4">
    <h1>Додати новий запис</h1>
    <form th:action="@{/add}" th:object="${viewInfo}" method="post" class="col-md-6">
        <div class="mb-3">
            <label class="form-label">Глядач</label>
            <input type="text" class="form-control" th:field="*{viewer}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Продюсер</label>
            <input type="text" class="form-control" th:field="*{producer}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Дата перегляду</label>
            <input type="date" class="form-control" th:field="*{watchedDate}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Час перегляду</label>
            <input type="time" class="form-control" th:field="*{watchedTime}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Назва відео</label>
            <input type="text" class="form-control" th:field="*{videoTitle}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Тривалість відео</label>
            <input type="text" class="form-control" th:field="*{videoDuration}" placeholder="00:00:00"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Жанр</label>
            <input type="text" class="form-control" th:field="*{genre}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Країна продюсера</label>
            <input type="text" class="form-control" th:field="*{producerCountry}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Рейтинг відео</label>
            <input type="number" step="0.1" min="0" max="10" class="form-control" th:field="*{videoRating}"/>
        </div>
        <div class="mb-3">
            <label class="form-label">Платформа</label>
            <input type="text" class="form-control" th:field="*{platform}"/>
        </div>
        <button type="submit" class="btn btn-success">Додати</button>
        <a th:href="@{/}" class="btn btn-secondary ms-2">Повернутись до таблиці</a>
    </form>
</body>
</html>
