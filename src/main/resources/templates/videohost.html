<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Відеохостінг</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="container mt-4">
    <h1>Відеохостінг</h1>
    <a th:href="@{/add}" class="btn btn-success mb-3">Додати запис</a>
    <table class="table table-striped table-bordered">
        <thead class="table-primary">
            <tr>
                <th>Глядач</th>
                <th>Продюсер</th>
                <th>Дата перегляду</th>
                <th>Час перегляду</th>
                <th>Назва відео</th>
                <th>Тривалість відео</th>
                <th>Жанр</th>
                <th>Країна продюсера</th>
                <th>Рейтинг відео</th>
                <th>Платформа</th>
                <th>Дія</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="viewInfo : ${viewInfoList}">
                <td th:text="${viewInfo.viewer}"></td>
                <td th:text="${viewInfo.producer}"></td>
                <td th:text="${viewInfo.watchedDate}"></td>
                <td th:text="${viewInfo.watchedTime}"></td>
                <td th:text="${viewInfo.videoTitle}"></td>
                <td th:text="${viewInfo.videoDuration}"></td>
                <td th:text="${viewInfo.genre}"></td>
                <td th:text="${viewInfo.producerCountry}"></td>
                <td th:text="${viewInfo.videoRating}"></td>
                <td th:text="${viewInfo.platform}"></td>
                <td>
                    <form th:action="@{/delete/{id}(id=${viewInfo.id})}" method="post">
                        <button type="submit" class="btn btn-danger btn-sm">Видалити</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
